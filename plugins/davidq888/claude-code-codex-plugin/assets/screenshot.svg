<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Claude Code Codex plugin screenshot</title>
  <desc id="desc">A simple preview of Claude Code status, login, and prompt tools in Codex.</desc>
  <rect width="1200" height="720" fill="#0f172a"/>
  <rect x="72" y="72" width="1056" height="576" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="112" y="140" fill="#f8fafc" font-family="Arial, sans-serif" font-size="44" font-weight="700">Claude Code for Codex</text>
  <text x="112" y="196" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="24">Safe local Claude Code access through Codex and MCP</text>
  <g font-family="Arial, sans-serif" font-size="24">
    <rect x="112" y="260" width="300" height="184" rx="16" fill="#1e293b"/>
    <text x="144" y="318" fill="#38bdf8" font-weight="700">Status</text>
    <text x="144" y="366" fill="#e2e8f0">Check local CLI</text>
