    <text x="482" y="318" fill="#a78bfa" font-weight="700">Login</text>
    <text x="482" y="366" fill="#e2e8f0">Official auth flow</text>
    <text x="482" y="406" fill="#94a3b8">No stored secrets</text>
    <rect x="788" y="260" width="300" height="184" rx="16" fill="#1e293b"/>
    <text x="820" y="318" fill="#34d399" font-weight="700">Prompt</text>
    <text x="820" y="366" fill="#e2e8f0">Manual or plan mode</text>
    <text x="820" y="406" fill="#94a3b8">Workspace-scoped</text>
  </g>
  <rect x="112" y="500" width="976" height="76" rx="14" fill="#020617" stroke="#334155"/>
  <text x="144" y="548" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24">Security-focused Claude Code CLI integration for OpenAI Codex</text>
