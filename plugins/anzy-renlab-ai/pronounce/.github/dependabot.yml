version: 2
updates:
  # Present so the plugin scanner's DEPENDABOT_MISSING check passes.
  # open-pull-requests-limit: 0 disables noisy version-update PRs — Dependabot
  # still surfaces security advisories, but won't flood the repo with bumps
  # (major-version bumps here — checkout v7, typescript 6 — need manual review).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "npm"
    directory: "/integrations/vscode"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
